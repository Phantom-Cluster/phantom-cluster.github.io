<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>Hitanshu Sahu</title>
  <defs>
    <!-- Background: deep dark with subtle blue-purple tone -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1d1a2f"/>
      <stop offset="100%" stop-color="#0a0912"/>
    </linearGradient>
    <!-- Skin: warm radial gradient for 3D spherical depth -->
    <radialGradient id="skinGrad" cx="40%" cy="32%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffe0c2"/>
      <stop offset="50%"  stop-color="#f2b688"/>
      <stop offset="100%" stop-color="#d4895e"/>
    </radialGradient>
    <!-- Ear skin -->
    <radialGradient id="earGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f0b080"/>
      <stop offset="100%" stop-color="#c87848"/>
    </radialGradient>
    <!-- Hair: near-black warm undertone -->
    <radialGradient id="hairGrad" cx="50%" cy="18%" r="72%">
      <stop offset="0%"   stop-color="#281a08"/>
      <stop offset="100%" stop-color="#0c0804"/>
    </radialGradient>
    <!-- Hair gloss -->
    <radialGradient id="hairShine" cx="50%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,220,160,0.13)"/>
      <stop offset="100%" stop-color="rgba(255,220,160,0)"/>
    </radialGradient>
    <!-- Iris -->
    <radialGradient id="irisGrad" cx="32%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#4e3018"/>
      <stop offset="100%" stop-color="#170d04"/>
    </radialGradient>
    <!-- Shirt: portfolio blue -->
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1C0EB6"/>
      <stop offset="100%" stop-color="#0e0870"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="114" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="114" fill="none"
        stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- Shirt collar at bottom -->
  <path d="M 120 512 L 120 448 C 120 432 132 420 148 420
           L 200 420 L 256 472 L 312 420
           L 364 420 C 380 420 392 432 392 448
           L 392 512 Z"
        fill="url(#shirtGrad)"/>
  <path d="M 204 422 L 256 468 L 308 422"
        stroke="rgba(255,255,255,0.1)" stroke-width="5"
        fill="none" stroke-linejoin="round"/>

  <!-- Hair blob behind face -->
  <ellipse cx="256" cy="185" rx="172" ry="180" fill="url(#hairGrad)"/>

  <!-- Ears -->
  <ellipse cx="93"  cy="288" rx="27" ry="34" fill="url(#earGrad)"/>
  <ellipse cx="419" cy="288" rx="27" ry="34" fill="url(#earGrad)"/>
  <ellipse cx="95"  cy="290" rx="15" ry="20" fill="rgba(160,85,45,0.28)"/>
  <ellipse cx="417" cy="290" rx="15" ry="20" fill="rgba(160,85,45,0.28)"/>

  <!-- Face -->
  <ellipse cx="256" cy="295" rx="162" ry="174" fill="url(#skinGrad)"/>

  <!-- Hair front — hairline over top of face -->
  <path d="
    M 84 215
    C 84 88 428 88 428 215
    C 424 148 386 110 336 98
    C 312 91 284 87 256 87
    C 228 87 200 91 176 98
    C 126 110 88 148 84 215 Z
  " fill="url(#hairGrad)"/>
  <!-- Hair gloss band -->
  <ellipse cx="256" cy="142" rx="115" ry="58" fill="url(#hairShine)"/>

  <!-- Left eye -->
  <ellipse cx="196" cy="276" rx="44" ry="40" fill="rgba(18,8,2,0.22)"/>
  <ellipse cx="196" cy="272" rx="40" ry="36" fill="white"/>
  <ellipse cx="198" cy="274" rx="25" ry="27" fill="url(#irisGrad)"/>
  <ellipse cx="198" cy="275" rx="15" ry="17" fill="#0c0602"/>
  <ellipse cx="187" cy="263" rx="10"  ry="8"  fill="white" opacity="0.92"/>
  <ellipse cx="206" cy="282" rx="4.5" ry="3.5" fill="white" opacity="0.38"/>

  <!-- Right eye -->
  <ellipse cx="316" cy="276" rx="44" ry="40" fill="rgba(18,8,2,0.22)"/>
  <ellipse cx="316" cy="272" rx="40" ry="36" fill="white"/>
  <ellipse cx="314" cy="274" rx="25" ry="27" fill="url(#irisGrad)"/>
  <ellipse cx="314" cy="275" rx="15" ry="17" fill="#0c0602"/>
  <ellipse cx="303" cy="263" rx="10"  ry="8"  fill="white" opacity="0.92"/>
  <ellipse cx="322" cy="282" rx="4.5" ry="3.5" fill="white" opacity="0.38"/>

  <!-- Eyebrows -->
  <path d="M 154 226 C 170 213 200 210 222 217"
        stroke="#1c1006" stroke-width="15" stroke-linecap="round" fill="none"/>
  <path d="M 290 217 C 312 210 342 213 358 226"
        stroke="#1c1006" stroke-width="15" stroke-linecap="round" fill="none"/>
  <path d="M 157 226 C 172 215 200 212 220 218"
        stroke="#3a2010" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M 292 218 C 312 212 340 215 355 226"
        stroke="#3a2010" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M 256 304 C 252 318 248 328 240 338"
        stroke="rgba(180,105,65,0.3)" stroke-width="4"
        stroke-linecap="round" fill="none"/>
  <ellipse cx="242" cy="344" rx="12" ry="8" fill="rgba(160,88,48,0.28)"/>
  <ellipse cx="270" cy="344" rx="12" ry="8" fill="rgba(160,88,48,0.28)"/>

  <!-- Smile -->
  <path d="M 210 380 C 228 400 284 400 302 380"
        stroke="#a06040" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 212 378 C 226 369 241 366 256 368 C 271 366 286 369 300 378"
        stroke="#c07858" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M 210 378 C 230 402 282 402 302 378"
        stroke="#cc8060" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Cheek blush -->
  <ellipse cx="158" cy="322" rx="36" ry="22" fill="rgba(230,120,90,0.13)"/>
  <ellipse cx="354" cy="322" rx="36" ry="22" fill="rgba(230,120,90,0.13)"/>

  <!-- Face highlight (top-left roundness) -->
  <ellipse cx="182" cy="210" rx="48" ry="36" fill="rgba(255,245,230,0.1)"/>
</svg>
