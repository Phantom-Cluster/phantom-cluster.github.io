<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>Hitanshu</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f53500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7a00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#f53500" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="#09090b" />
  <rect width="512" height="512" rx="128" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4" />
  
  <path d="M 160 120 L 160 360 M 352 120 L 352 360 M 160 240 L 352 240" 
        stroke="url(#grad)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
        
  <text x="256" y="440" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6">HITANSHU</text>
</svg>